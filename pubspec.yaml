name: bakesmart
description: BakeSmart - Bakery Management & Marketplace Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  cloud_functions: ^5.1.3
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.5

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  fl_chart: ^0.69.0

  # Image
  image_picker: ^1.1.2
  http: ^1.2.2

  # Utils
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  flutter_local_notifications: ^17.2.2
  uuid: ^4.5.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
    - assets/icons/
    - assets/lottie/
